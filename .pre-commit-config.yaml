repos:
  # Built-in pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        files: \.(yaml|yml)$

  # Secrets detection — local hook so we can handle exit code 3 gracefully.
  # Exit 1 = new secret found (blocks commit). Exit 3 = baseline line numbers
  # updated (auto-staged and allowed through). This prevents false-positive
  # commit blocks when file edits shift line numbers of known non-secrets.

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0  # Use the latest version
    hooks:
    - id: detect-secrets
      args: ['--baseline', '.secrets.baseline']
      exclude: go\.sum

  # Go-specific hooks (run via local system tools)
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        language: system
        entry: go vet ./...
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run
        pass_filenames: false
        types: [go]

      - id: go-test
        name: go test
        language: system
        entry: go test ./...
        pass_filenames: false
        types: [go]
