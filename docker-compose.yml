services:
  plantcare:
    build: .
    image: plantcare:latest
    container_name: plantcare
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WEB_DIR: "/app/web"
      # Anthropic API key — required for plant identification
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      # Bearer token for API authentication (optional — if unset, auth is disabled)
      API_KEY: "${API_KEY:-}"
      # Storage: sqlite for local, dynamodb for cloud
      STORAGE_TYPE: "sqlite"
      SQLITE_PATH: "/data/plantcare.db"
      # Only needed when STORAGE_TYPE=dynamodb
      # AWS_REGION: "${AWS_REGION:-us-east-1}"
      # AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      # AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      # AWS_PROFILE: "${AWS_PROFILE:-}"
    volumes:
      # Persistent SQLite data — survives container stop/restart/rebuild.
      # Only destroyed by: docker-compose down -v  or  make docker-down-clean
      - plantcare-data:/data
      # Uncomment if using STORAGE_TYPE=dynamodb with a named AWS profile
      # - "${HOME}/.aws:/home/nonroot/.aws:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  plantcare-data:
